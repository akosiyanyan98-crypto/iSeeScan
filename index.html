<!DOCTYPE html>
<html>
<head>
<title>iSeeScan Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* --- Fix: Stretches the repository image across the viewport --- */
.background-img {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
}

/* --- Fix: Highly darkened overlay so the motherboard blends in like the main page --- */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(3, 7, 18, 0.95) 20%, rgba(6, 11, 25, 0.9) 100%);
    z-index: -1;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* Welcome Logo Animation */
.welcome-logo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #060913;
    z-index: 999;
    animation: fadeOut 3s forwards;
}

.welcome-logo h1 {
    color: #00eaff; 
    font-size: 60px;
    letter-spacing: 3px;
    animation: fadeIn 1.5s;
    text-shadow: 0 0 25px rgba(0, 234, 255, 0.6);
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: scale(.8);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes fadeOut {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% {
        opacity: 0;
        visibility: hidden;
    }
}

/* Container Dark-Glass Design */
.container {
    background: rgba(13, 19, 33, 0.85);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 40px;
    width: min(90%, 380px);
    border-radius: 20px;
    text-align: center;
    border: 1px solid rgba(0, 234, 255, 0.25);
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 234, 255, 0.05);
}

h1 {
    color: #00eaff; 
    font-size: clamp(2rem, 5vw, 2.8rem);
    margin-bottom: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(0, 234, 255, 0.2);
}

p {
    color: #8fa0ba; 
    font-size: 15px;
    margin-bottom: 10px;
}

/* Input Styles */
input {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border: 1px solid #1a2333;
    border-radius: 10px;
    font-size: 16px;
    background: #0a0f1d;
    color: #ffffff;
    outline: none;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

input:focus {
    border-color: #00bfff; 
    box-shadow: 0 0 12px rgba(0, 191, 255, 0.35);
    background: #0f1626;
}

input::placeholder {
    color: #43536c;
}

/* Button Custom Mature Gradient Styles */
button {
    width: 100%;
    margin-top: 25px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00eaff, #0077ff);
    color: #ffffff; 
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0, 119, 255, 0.4);
    transition: all 0.3s ease;
    box-sizing: border-box;
    letter-spacing: 0.5px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 234, 255, 0.5);
    filter: brightness(1.1);
}

button:active {
    transform: translateY(0);
}

/* Mobile Layout Configuration */
@media (max-width: 768px) {
    body {
        padding: 20px;
    }

    .container {
        width: 100%;
        padding: 30px 20px;
    }

    .welcome-logo h1 {
        font-size: 42px;
    }

    h1 {
        font-size: 32px;
    }

    p {
        font-size: 14px;
    }

    input, button {
        font-size: 16px;
        padding: 12px;
    }
}

@media (min-width: 1200px) {
    .container {
        width: 420px;
    }
}

</style>
</head>
<body>

<!-- Fix: Pulls the repository file dynamically into the HTML layout -->
<img src="motherboard-background.png" class="background-img" alt="motherboard-background">

<div class="welcome-logo">
    <h1>🔍 iSeeScan</h1>
</div>

<div class="container">
    <h1>iSeeScan</h1>
    <p>Enter your nickname to continue</p>
    <input id="nickname" type="text" placeholder="Your nickname">
    <button onclick="enterSite()">Enter</button>
</div>

<script>
function enterSite() {
    let name = document.getElementById("nickname").value;

    if (name.trim() === "") {
        alert("Please enter a nickname");
    } else {
        localStorage.setItem("userNickname", name);
        window.location.href = "main.html";
    }
}
</script>

</body>
</html>
