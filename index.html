<!DOCTYPE html>
<html>
<head>
<title>iSeeScan Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

input,
button{
    width:100%;
    padding:14px;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

input{
    border:none;
    margin-top:20px;
}

button{
    margin-top:20px;
    border:none;
    background:#00d4ff;
    color:#111827;
    font-weight:bold;
    cursor:pointer;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Welcome Logo Animation */

.welcome-logo{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#111827;

    z-index:999;

    animation:fadeOut 3s forwards;

}


.welcome-logo h1{

    color:#00d4ff;

    font-size:60px;

    letter-spacing:3px;

    animation:fadeIn 1.5s;

    text-shadow:

    0 0 20px cyan;

}



@keyframes fadeIn{

from{

opacity:0;

transform:scale(.8);

}


to{

opacity:1;

transform:scale(1);

}

}



@keyframes fadeOut{

0%{

opacity:1;

}


80%{

opacity:1;

}


100%{

opacity:0;

visibility:hidden;

}

}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI', Arial, sans-serif;
    background:
    linear-gradient(
    135deg,
    #111827,
    #1e3a8a
    );
    color:white;
}

.container{
    background:#1f2937;
    padding:40px;
    width:min(90%,380px);
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{
    color:#00d4ff;
    font-size:clamp(2rem,5vw,2.8rem);
    margin-bottom:10px;
}

input{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00d4ff;
    color:#111827;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:white;
    transform:translateY(-2px);
}

p{
    color:#d1d5db;
}

/* Mobile Layout Configuration */
        @media (max-width:768px){

body{
    padding:20px;
}

.container{
    width:100%;
    padding:25px;
}

.welcome-logo h1{
    font-size:42px;
}

h1{
    font-size:32px;
}

p{
    font-size:15px;
}

input{
    font-size:16px;
    padding:12px;
}

button{
    font-size:16px;
    padding:12px;
}

}

@media (min-width:1200px){

.container{
    width:420px;
}

}

</style>

</head>

<body>
    <div class="welcome-logo">

<h1>
🔍 iSeeScan
</h1>

</div>

<div class="container">

<h1>iSeeScan</h1>

<p>Enter your nickname to continue</p>

<input id="nickname" type="text" placeholder="Your nickname">

<button onclick="enterSite()">Enter</button>

</div>


<script>

function enterSite(){

    let name = document.getElementById("nickname").value;

    if(name.trim() === ""){
        alert("Please enter a nickname");
    }
    else{

        localStorage.setItem("userNickname", name);

        window.location.href="main.html";

    }

}

</script>


</body>
</html>
